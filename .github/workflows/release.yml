name: Android CI

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-22.04   # pin version for stability

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Install Android SDK properly (NOT via apt)
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode signing key
        run: echo "${{ secrets.SIGNING_KEY }}" | base64 -d > release-keystore.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Build unsigned release
      - name: Build release APK (unsigned)
        run: ./gradlew assembleRelease

      # Find latest build-tools dynamically (no hardcoded 34.0.0)
      - name: Get latest build-tools version
        id: buildtools
        run: |
          VERSION=$(ls $ANDROID_HOME/build-tools | sort -V | tail -n 1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Align APK
        run: |
          $ANDROID_HOME/build-tools/$VERSION/zipalign -v 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            app/build/outputs/apk/release/app-release-aligned.apk

      - name: Sign APK
        run: |
          $ANDROID_HOME/build-tools/$VERSION/apksigner sign \
            --ks release-keystore.jks \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            app/build/outputs/apk/release/app-release-aligned.apk

      - name: Verify signature
        run: |
          $ANDROID_HOME/build-tools/$VERSION/apksigner verify \
            app/build/outputs/apk/release/app-release-aligned.apk

      - name: Rename final APK
        run: mv app/build/outputs/apk/release/app-release-aligned.apk BoutScoring.apk

      - name: Upload final APK
        uses: softprops/action-gh-release@v2
        with:
          files: BoutScoring.apk
